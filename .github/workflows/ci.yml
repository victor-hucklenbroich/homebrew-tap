# Lints the tap on every push/PR including the automated version bumps pushed
# by the desk-controller release workflow so a malformed cask/formula never
# lands silently.
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"
  HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}

jobs:
  audit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # brew's style/audit commands only operate on installed taps, so expose
      # this checkout as the tap instead of cloning it a second time.
      - name: Register checkout as victor-hucklenbroich/tap
        run: |
          tap_dir="$(brew --repository)/Library/Taps/victor-hucklenbroich/homebrew-tap"
          mkdir -p "$(dirname "$tap_dir")"
          ln -s "$GITHUB_WORKSPACE" "$tap_dir"

      - name: brew style
        run: brew style victor-hucklenbroich/tap

      # --online also verifies the release archive referenced by a cask
      # actually exists, catching a bump that points at a missing asset.
      # Enumerated from Casks/ so newly added casks are covered automatically.
      - name: Audit casks
        run: basename -s .rb Casks/*.rb | sed 's|^|victor-hucklenbroich/tap/|' | xargs brew audit --cask --online
